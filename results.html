<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGs</title>
  <link rel="stylesheet" href="style.css">
</head>
  <script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}
</script>
<body>

  <div class="page-wrapper">

    <div class="content-box">

      <h1 class="title">Available PGs</h1>
      <div id="pg-list" class="pg-container"></div>

    </div>

  </div>

<script>
const area = (localStorage.getItem("area") || "").toLowerCase();
const budget = (localStorage.getItem("budget") || "").trim();
const hometown = (localStorage.getItem("hometown") || "").toLowerCase();

fetch("https://hauora.onrender.com/pgs")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("pg-list");

  const filtered = data.filter(pg => {

    const location = pg.location.toLowerCase();

    return (
      (area === "" || location.includes(area)) &&
      (budget === "" || pg.price <= Number(budget))
    );

  });

  if(filtered.length === 0){
    container.innerHTML = "<p>No PGs found 😢</p>";
    return;
  }

  filtered.forEach(pg => {

    const match = pg.hometown.toLowerCase() === hometown;

    container.innerHTML += `
      <div class="pg-card">

        ${match ? `<p style="color:green;font-weight:bold;">⭐ Same Hometown</p>` : ""}

        <h2>${pg.name}</h2>
        <p>📍 ${pg.location}</p>
        <p>🏠 ${pg.hometown}</p>
        <p class="price">₹${pg.price}/month</p>

        <div class="facilities">
          ${pg.facilities.map(f => `<p>✔ ${f}</p>`).join("")}
        </div>

        <button onclick="viewDetails('${pg.name}')">View Details</button>
      </div>
    `;
  });

});

function viewDetails(name) {
  localStorage.setItem("pgName", name);
  window.location.href = "details.html";
}
</script>

</body>
</html>
