<!DOCTYPE html>
<html>
<head>
  <title>Add PG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="login-box">
    <h2>Add Your PG</h2>

    <input id="name" placeholder="PG Name">
    <input id="location" placeholder="Location">
    <input id="price" placeholder="Price">
    <input id="contact" placeholder="Contact Number">

    <button onclick="addPG()">Add PG</button>
  </div>

  <script>
    function addPG() {
      const pg = {
        name: document.getElementById("name").value,
        location: document.getElementById("location").value,
        price: document.getElementById("price").value,
        contact: document.getElementById("contact").value
      };

      fetch("https://hauora.onrender.com/add-pg", {   // ✅ FIXED (no localhost)
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(pg)
      })
      .then(res => res.json())
      .then(data => {
        alert("PG Added Successfully ✅");
        window.location.href = "results.html";
      })
      .catch(err => {
        alert("Error adding PG ❌");
        console.log(err);
      });
    }
  </script>
</body>
</html>
