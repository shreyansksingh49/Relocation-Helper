<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="details" class="details-card"></div>

<script>
const name = localStorage.getItem("pgName");

fetch("https://hauora.onrender.com/pgs")
.then(res => res.json())
.then(data => {
  const pg = data.find(p => p.name === name);

  document.getElementById("details").innerHTML = `
    <h2>${pg.name}</h2>
    <p>📍 ${pg.location}</p>
    <p class="price">₹${pg.price}/month</p>
    <p>📞 ${pg.contact}</p>
    <button onclick="goBack()">← Back</button>
  `;
});

function goBack() {
  window.location.href = "results.html";
}
</script>

</body>
</html>
