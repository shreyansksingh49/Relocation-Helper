<!DOCTYPE html>
<html>
<head>
  <title>Details</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>PG Details</h1>
    <div id="details"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    fetch("https://hauora.onrender.com/pgs")
      .then(res => res.json())
      .then(data => {
        const pg = data.find(p => p.name === name);

        document.getElementById("details").innerHTML = `
          <div class="card">
            <h2>${pg.name}</h2>
            <p>${pg.location}</p>
            <p>₹${pg.price}</p>
            <p>Contact: ${pg.contact}</p>
          </div>
        `;
      });
  </script>
</body>
</html>
