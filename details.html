<!DOCTYPE html>
<html>
<head>
  <title>Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 style="text-align:center;">PG Details</h1>

<div id="details"></div>

<script>
const API = "https://hauora.onrender.com/pgs";
const selected = localStorage.getItem("pg");

fetch(API)
.then(res=>res.json())
.then(data=>{
  const pg = data.find(p=>p.name === selected);

  if(pg){
    document.getElementById("details").innerHTML = `
      <div class="card">
        <h2>${pg.name}</h2>
        <p><b>Location:</b> ${pg.location}</p>
        <p><b>Price:</b> ₹${pg.price}</p>
        <p><b>Contact:</b> ${pg.contact}</p>
      </div>
    `;
  }
});
</script>

</body>
</html>
