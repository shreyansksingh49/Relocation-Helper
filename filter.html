<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find PG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
  <h2>Find Your PG 🔍</h2>

  <input id="city" placeholder="City">
  <input id="area" placeholder="Area">
  <input id="hometown" placeholder="Your Hometown">
  <input id="budget" placeholder="Budget">

  <button onclick="findPG()">Find PGs</button>
</div>

<script>
function findPG() {
  const city = document.getElementById("city").value.toLowerCase();
  const area = document.getElementById("area").value.toLowerCase();
  const budget = document.getElementById("budget").value;
  const hometown = document.getElementById("hometown").value.toLowerCase();

  // localStorage me save kar
  localStorage.setItem("city", city);
  localStorage.setItem("area", area);
  localStorage.setItem("budget", budget);
  localStorage.setItem("hometown", hometown);

  window.location.href = "results.html";
}
</script>
</body>
</html>
